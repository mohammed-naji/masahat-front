<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      padding-top: 40px;
    }

    .fancy-title1 {
      text-align: center;
    }

    .fancy-title1 hr {
      border: 0;
      border-bottom: 2px solid #000;
      margin: 0;
    }

    .fancy-title1 span {
      background-color: #fff;
      padding: 0 30px;
      display: inline-block;
      transform: translateY(calc(-50% - 1px));
    }


    .fancy-title2 {
      text-align: center;
    }

    .fancy-title2 div {
      height: 2px;
      background: #f00;
    }

    .fancy-title2 span {
      background-color: #fff;
      padding: 0 30px;
      display: inline-block;
      transform: translateY(calc(-50% - 1px));
    }

    .fancy-title3 {
      text-align: center;
    }

    .fancy-title3:before {
      content: '';
      width: 100%;
      height: 2px;
      display: block;
      background: rgb(121, 0, 128);
    }

    .fancy-title3 span {
      background-color: #fff;
      padding: 0 30px;
      display: inline-block;
      transform: translateY(calc(-50% - 1px));
    }

    /* .fancy-title3:after {
      content: 'after';
    } */
  </style>
</head>

<body>

  <div class="container">

    <div class="fancy-title1">
      <hr>
      <span>Fancy Title 1</span>
    </div>

    <br>
    <br>
    <br>
    <div class="fancy-title2">
      <div></div>
      <span>Fancy Title 2</span>
    </div>
    <br>
    <br>
    <br>
    <div class="fancy-title3">
      <span>Fancy Title 3</span>
    </div>

  </div>

</body>

</html>
